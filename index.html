<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VN Hitbox - Get Key</title>
    <style>
        body {
            background-color: #0b0b12;
            color: #00f3ff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: #121220;
            border: 1px solid #00f3ff;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.2);
            width: 320px;
        }
        h2 {
            margin-bottom: 20px;
            font-size: 18px;
        }
        .key-box {
            background: #18182e;
            border: 1px dashed #00f3ff;
            padding: 12px;
            font-size: 14px;
            color: #00ff96;
            margin-bottom: 20px;
            word-break: break-all;
            border-radius: 6px;
        }
        button {
            background-color: #00f3ff;
            color: #0b0b12;
            border: none;
            padding: 12px 20px;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            cursor: pointer;
            border-radius: 6px;
            width: 100%;
            transition: 0.2s;
        }
        button:hover {
            background-color: #00bfcc;
        }
        .note {
            font-size: 10px;
            color: #8888aa;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>⚡ VN HITBOX - SYSTEM</h2>
        <div class="key-box" id="keyDisplay">Đang tải key...</div>
        <button id="copyBtn" onclick="copyKey()">COPY KEY</button>
        <div class="note">Key cố định theo thiết bị trong 24h!</div>
    </div>

    <script>
        // Hàm random chuỗi hỗn hợp chuẩn 4 hoa, 4 thường, 3 số
        function generateRandomKey() {
            const uppercase = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            const lowercase = "abcdefghijklmnopqrstuvwxyz";
            const numbers = "0123456789";

            let chars = [];
            for (let i = 0; i < 4; i++) {
                chars.push(uppercase.charAt(Math.floor(Math.random() * uppercase.length)));
            }
            for (let i = 0; i < 4; i++) {
                chars.push(lowercase.charAt(Math.floor(Math.random() * lowercase.length)));
            }
            for (let i = 0; i < 3; i++) {
                chars.push(numbers.charAt(Math.floor(Math.random() * numbers.length)));
            }

            // Xáo trộn ngẫu nhiên hoàn toàn
            for (let i = chars.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1));
                [chars[i], chars[j]] = [chars[j], chars[i]];
            }

            return "vn-" + chars.join("");
        }

        // Kiểm tra xem trình duyệt đã lưu key trước đó chưa (tránh việc tải lại trang bị đổi key)
        const STORAGE_KEY = "vn_hitbox_user_key";
        const STORAGE_TIME = "vn_hitbox_key_time";
        
        let activeKey = localStorage.getItem(STORAGE_KEY);
        let savedTime = localStorage.getItem(STORAGE_TIME);
        let currentTime = new Date().getTime();

        // Nếu chưa có key hoặc đã quá 24 giờ (86400000 ms) thì mới tạo key mới
        if (!activeKey || !savedTime || (currentTime - savedTime > 86400000)) {
            activeKey = generateRandomKey();
            localStorage.setItem(STORAGE_KEY, activeKey);
            localStorage.setItem(STORAGE_TIME, currentTime);
        }

        // Hiển thị key ra màn hình
        document.getElementById("keyDisplay").innerText = activeKey;

        function copyKey() {
            const keyText = document.getElementById("keyDisplay").innerText;
            navigator.clipboard.writeText(keyText).then(() => {
                const btn = document.getElementById("copyBtn");
                btn.innerText = "ĐÃ COPY KEY!";
                setTimeout(() => {
                    btn.innerText = "COPY KEY";
                }, 2000);
            });
        }
    </script>
</body>
</html>
