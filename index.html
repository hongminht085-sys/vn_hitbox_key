<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VN Hitbox - Get Key</title>
    <style>
        body {
            background-color: #0b0b12;
            color: #00f3ff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: #121220;
            border: 1px solid #00f3ff;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.2);
            width: 320px;
            box-sizing: border-box;
        }
        h2 {
            margin-bottom: 20px;
            font-size: 18px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background-color: #ff0050;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            cursor: pointer;
            text-decoration: none;
            box-sizing: border-box;
            font-size: 13px;
        }
        .btn:disabled {
            background-color: #333344;
            color: #888899;
            cursor: not-allowed;
        }
        .btn-get {
            background-color: #00c8ff;
            color: #0b0b12;
        }
        .key-box {
            background: #18182e;
            border: 1px dashed #00f3ff;
            padding: 12px;
            font-size: 14px;
            color: #00ff96;
            margin: 15px 0;
            word-break: break-all;
            border-radius: 6px;
            display: none;
        }
        .note {
            font-size: 10px;
            color: #8888aa;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>⚡ VN HITBOX - SYSTEM</h2>
        
        <!-- Nút Follow TikTok -->
        <a href="https://www.tiktok.com/@scrip481?_r=1&_t=ZS-98FSutt6KxD" target="_blank" id="followBtn" class="btn" onclick="startCountdown()">
            1. FOLLOW TIKTOK
        </a>

        <!-- Nút Nhận Key (đếm ngược 7s) -->
        <button id="getKeyBtn" class="btn btn-get" disabled onclick="revealKey()">
            2. LẤY KEY (7s)
        </button>

        <!-- Ô hiển thị Key và nút Copy -->
        <div id="keyDisplay" class="key-box"></div>
        <button id="copyBtn" class="btn btn-get" style="display:none;" onclick="copyKey()">COPY KEY</button>

        <div class="note">Key cố định theo thiết bị trong 24h!</div>
    </div>

    <script>
        let hasClickedFollow = false;

        function startCountdown() {
            hasClickedFollow = true;
            let btn = document.getElementById("getKeyBtn");
            let timeLeft = 7;
            
            btn.disabled = true;
            
            let timer = setInterval(function() {
                if (timeLeft > 0) {
                    btn.innerText = "ĐỢI XÍU (" + timeLeft + "s)...";
                    timeLeft--;
                } else {
                    clearInterval(timer);
                    btn.innerText = "NHẬN KEY NGAY";
                    btn.disabled = false;
                }
            }, 1000);
        }

        function generateRandomKey() {
            const uppercase = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            const lowercase = "abcdefghijklmnopqrstuvwxyz";
            const numbers = "0123456789";

            let chars = [];
            for (let i = 0; i < 4; i++) {
                chars.push(uppercase.charAt(Math.floor(Math.random() * uppercase.length)));
            }
            for (let i = 0; i < 4; i++) {
                chars.push(lowercase.charAt(Math.floor(Math.random() * lowercase.length)));
            }
            for (let i = 0; i < 3; i++) {
                chars.push(numbers.charAt(Math.floor(Math.random() * numbers.length)));
            }

            for (let i = chars.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1));
                [chars[i], chars[j]] = [chars[j], chars[i]];
            }

            return "vn-" + chars.join("");
        }

        const STORAGE_KEY = "vn_hitbox_user_key";
        const STORAGE_TIME = "vn_hitbox_key_time";
        
        let activeKey = localStorage.getItem(STORAGE_KEY);
        let savedTime = localStorage.getItem(STORAGE_TIME);
        let currentTime = new Date().getTime();

        if (!activeKey || !savedTime || (currentTime - savedTime > 86400000)) {
            activeKey = generateRandomKey();
            localStorage.setItem(STORAGE_KEY, activeKey);
            localStorage.setItem(STORAGE_TIME, currentTime);
        }

        function revealKey() {
            if (!hasClickedFollow) return;
            document.getElementById("keyDisplay").innerText = activeKey;
            document.getElementById("keyDisplay").style.display = "block";
            document.getElementById("copyBtn").style.display = "block";
            document.getElementById("getKeyBtn").style.display = "none";
        }

        function copyKey() {
            navigator.clipboard.writeText(activeKey).then(() => {
                const btn = document.getElementById("copyBtn");
                btn.innerText = "✔ ĐÃ COPY KEY!";
                setTimeout(() => {
                    btn.innerText = "COPY KEY";
                }, 2000);
            });
        }
    </script>
</body>
</html>
