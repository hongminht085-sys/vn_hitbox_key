<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vn-hitbox - Get Key</title>
    <style>
        body {
            background-color: #0a0a12;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #12121c;
            border: 1px solid #00f3ff;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            width: 320px;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
        }
        h2 {
            color: #00f3ff;
            font-size: 18px;
            margin-bottom: 20px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background-color: #ff0050;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            text-decoration: none;
            box-sizing: border-box;
        }
        .btn:disabled {
            background-color: #333344;
            color: #888899;
            cursor: not-allowed;
        }
        .btn-get {
            background-color: #00c8ff;
            color: #0a0a12;
        }
        .key-box {
            background-color: #1a1a2e;
            border: 1px dashed #00f3ff;
            padding: 10px;
            margin-top: 15px;
            word-break: break-all;
            color: #00ff96;
            font-weight: bold;
            font-size: 14px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>⚡ vn-hitbox // GET KEY</h2>
        
        <!-- Nút Follow TikTok đã được gắn link chuẩn của bro -->
        <a href="https://www.tiktok.com/@scrip481?_r=1&_t=ZS-98FSutt6KxD" target="_blank" id="followBtn" class="btn" onclick="startCountdown()">
            1. FOLLOW TIKTOK
        </a>

        <!-- Nút Nhận Key đếm ngược 7s -->
        <button id="getKeyBtn" class="btn btn-get" disabled onclick="generateKey()">
            2. LẤY KEY (7s)
        </button>

        <!-- Ô hiển thị Key -->
        <div id="keyDisplay" class="key-box"></div>
    </div>

    <script>
        let hasClickedFollow = false;

        function startCountdown() {
            hasClickedFollow = true;
            let btn = document.getElementById("getKeyBtn");
            let timeLeft = 7;
            
            btn.disabled = true;
            
            let timer = setInterval(function() {
                if (timeLeft > 0) {
                    btn.innerText = "ĐỢI XÍU (" + timeLeft + "s)...";
                    timeLeft--;
                } else {
                    clearInterval(timer);
                    btn.innerText = "NHẬN KEY NGAY";
                    btn.disabled = false;
                }
            }, 1000);
        }

        function generateKey() {
            if (!hasClickedFollow) return;

            // Tạo chuỗi ngẫu nhiên gồm chữ hoa, chữ thường và số
            const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
            let randomStr = "";
            for (let i = 0; i < 12; i++) {
                randomStr += chars.charAt(Math.floor(Math.random() * chars.length));
            }

            // Gắn tiền tố vn- ở đầu
            let finalKey = "vn-" + randomStr;

            let keyBox = document.getElementById("keyDisplay");
            keyBox.style.display = "block";
            keyBox.innerText = finalKey;

            // Tự động copy key vào bộ nhớ tạm
            if (navigator.clipboard) {
                navigator.clipboard.writeText(finalKey);
                document.getElementById("getKeyBtn").innerText = "✔ ĐÃ COPY KEY!";
            }
        }
    </script>
</body>
</html>
